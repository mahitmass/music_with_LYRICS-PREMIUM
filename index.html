<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pro Media Player</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
  
  <style>
    /* STATIC AMBIENT GLOW ARROW (Zero CPU Usage) */
    .queue-hint { 
      position: absolute; right: 20px; top: 50%; margin-top: -27px; 
      color: rgba(255,255,255,0.2); 
      text-shadow: 0 0 20px rgba(76,194,255,0.6); /* Permanent static glow */
      z-index: 12; pointer-events: none; display: none; font-size: 55px; 
      transition: opacity 0.3s ease; 
    }
    body.immersive .queue-hint { display: block; }
    
    /* It still cleanly fades away when you hover to open the menu */
    .hover-queue-hitbox:hover ~ .queue-hint, .hover-queue:hover ~ .queue-hint, .hover-queue.force-open ~ .queue-hint { 
      opacity: 0; 
    }

    /* RED HOVER FOR DELETE BUTTON */
    .del-btn { cursor: pointer; padding: 15px 15px; pointer-events: auto; border-radius: 6px; transition: 0.2s; color: var(--dim); display: flex; align-items: center; justify-content: center; }
    .del-btn:hover { background: rgba(255, 76, 76, 0.15); color: #ff4c4c; }

    /* FIX: STOP BACKGROUND TEXT SELECTION ON DOUBLE TAP */
    .lyrics-view { user-select: none; -webkit-user-select: none; }
    .lyric-line { user-select: text; -webkit-user-select: text; }

    :root { --bg: #0b0b0b; --panel: #161616; --accent: #4cc2ff; --dim: #888; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: background 0.5s ease; }
    
    #bg-blur { position: absolute; top: 0; left: 0; width: 100%; height: 100%; filter: blur(80px) brightness(0.3); opacity: 0; transition: opacity 1s ease, background-image 1s ease; z-index: -1; pointer-events: none; background-size: cover; background-position: center; transform: translateZ(0); will-change: opacity, background-image; }
    body.immersive #bg-blur { opacity: 1; }

    .main { display: flex; flex: 1; height: calc(100vh - 100px); position: relative; }
    
    /* SIDEBAR & QUEUE */
    .sidebar { width: 340px; background: var(--panel); padding: 20px; border-right: 1px solid #222; display: flex; flex-direction: column; transition: transform 0.4s ease, width 0.4s ease; z-index: 5; }
    body.immersive .sidebar { transform: translateX(-100%); width: 0; padding: 0; border: none; overflow: hidden; }
    
    .btn { background: #222; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; text-align: left; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
    .btn:hover { background: #333; }
    
    .top-controls { display: flex; gap: 10px; margin-bottom: 15px; }
    .dropdown { position: relative; flex: 1; }
    .dropdown-content { display: none; position: absolute; background-color: #333; width: 100%; box-shadow: 0px 8px 16px rgba(0,0,0,0.5); border-radius: 8px; z-index: 10; overflow: hidden; margin-top: 5px; }
    .dropdown-content a { color: white; padding: 12px 16px; text-decoration: none; display: block; cursor: pointer; font-size: 0.9rem; border-bottom: 1px solid #444; }
    .dropdown-content a:hover { background-color: #4cc2ff; color: black; font-weight: bold; }
    .dropdown:hover .dropdown-content { display: block; }
    
    .search-box { background: #222; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; outline: none; }
    .search-box:focus { border-color: var(--accent); }

    .list-container { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
    .item { padding: 10px; cursor: grab; border-radius: 6px; color: var(--dim); font-size: 0.9rem; margin-bottom: 4px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s, padding 0.2s, border 0.2s; }
    .item.active { color: var(--accent); background: #1a262e; font-weight: bold; }
    .item:hover { background: #2a2a2a; }
    .item.drag-target { border-top: 40px solid #2a3b47 !important; border-bottom: none !important; } 
    .item-left { display: flex; align-items: center; gap: 10px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; pointer-events: none; }
    
    /* IMMERSIVE QUEUE & SEARCH */
    .hover-queue { position: absolute; right: 0; top: 0; width: 340px; height: 100%; background: rgba(22,22,22,0.6); backdrop-filter: blur(20px); transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); padding: 20px; border-left: 1px solid rgba(255,255,255,0.1); z-index: 10; display: none; flex-direction: column; }
    body.immersive .hover-queue { display: flex; }
    .hover-queue-hitbox { position: absolute; right: 0; top: 0; width: 40px; height: 100%; z-index: 11; }
    .hover-queue:hover, .hover-queue-hitbox:hover + .hover-queue, .hover-queue.force-open { transform: translateX(0); }

    .imm-search-container { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); z-index: 15; width: 40px; height: 40px; background: rgba(0,0,0,0.5); border-radius: 30px; transition: 0.3s; display: none; overflow: hidden; align-items: center; padding: 0 10px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    body.immersive .imm-search-container { display: flex; }
    .imm-search-container:hover, .imm-search-container:focus-within { width: 400px; background: rgba(0,0,0,0.8); }
    .imm-search-input { background: transparent; border: none; color: white; width: 100%; margin-left: 10px; outline: none; font-size: 1rem; opacity: 0; transition: 0.3s; }
    .imm-search-container:hover .imm-search-input, .imm-search-container:focus-within .imm-search-input { opacity: 1; }
    .imm-search-results { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); width: 400px; max-height: 400px; background: rgba(22,22,22,0.9); backdrop-filter: blur(15px); border-radius: 12px; z-index: 15; overflow-y: auto; display: none; border: 1px solid rgba(255,255,255,0.1); }

    .album-cover { position: absolute; bottom: 30px; left: 30px; width: 220px; height: 220px; border-radius: 12px; box-shadow: 0px 15px 35px rgba(0,0,0,0.6); object-fit: cover; opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; z-index: 5; pointer-events: none; }
    body.immersive .album-cover { opacity: 1; transform: translateY(0); }

    .basic-lyrics-btn { position: absolute; bottom: 20px; right: 30px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: var(--dim); border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; z-index: 5; backdrop-filter: blur(10px); }
    .basic-lyrics-btn:hover { background: var(--accent); color: black; transform: scale(1.1); }
    body.immersive .basic-lyrics-btn { display: none; }

    /* IMMERSIVE LYRIC TOOLS */
    .lyric-tools { 
      position: absolute; bottom: 40px; right: 80px; display: none; align-items: center; gap: 15px; 
      background: rgba(0, 0, 0, 0.4); /* Dark but transparent background */
      padding: 10px 20px; border-radius: 30px; 
      backdrop-filter: blur(15px); 
      opacity: 1; /* FIX: Full opacity so it doesn't vanish */
      transition: all 0.4s ease; z-index: 5; 
      border: 1px solid rgba(255, 255, 255, 0.15); /* Faint permanent border */
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    body.immersive .lyric-tools { display: flex; }
    .lyric-tools:hover { 
      background: rgba(30, 30, 30, 0.85); 
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    .tool-btn { 
      cursor: pointer; 
      color: rgba(255, 255, 255, 0.4); /* Dim but visible default state */
      transition: 0.2s; font-size: 24px; 
    }
    .lyric-tools:hover .tool-btn {
      color: rgba(255, 255, 255, 0.7); /* All icons brighten slightly when you hover the container */
    }
    .tool-btn:hover, .tool-btn.active { 
      color: white !important; transform: scale(1.1); text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); 
    }
    .sync-ui { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; display: none; }

    .lyrics-view { flex: 1; padding: 30px 50px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; scroll-behavior: smooth; mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%); z-index: 1; }
   .lyric-line { 
      font-size: 1.8rem; 
      font-weight: 700; 
      color: rgba(255,255,255,0.3); 
      margin: 20px 0; /* Slightly tighter spacing so more lines fit on screen */
      text-align: center; 
      max-width: 800px; 
      line-height: 1.5; 
      /* Removed the scale transformation so text stays perfectly still */
      transition: color 0.3s ease, text-shadow 0.3s ease; /* Much faster transition for raps */
      cursor: pointer; 
      outline: none; 
    }
    .lyric-line:hover { color: rgba(255,255,255,0.6); }
    .lyric-line.highlight { 
      color: #ffffff; 
      opacity: 1; 
      /* Rely on a bright, smooth glow instead of zooming in */
      text-shadow: 0px 0px 25px rgba(76, 194, 255, 0.8); 
    }
    /* PLAYER BAR */
    .player-bar { 
      height: 100px; background: var(--panel); border-top: 1px solid #222; 
      display: flex; align-items: center; padding: 0 30px; z-index: 20; position: relative; 
      transition: opacity 1.5s ease; /* Smooth, slow fade */
    }
    .player-bar.idle {
      opacity: 0.15; /* Drops opacity heavily when AFK */
    }    .info { width: 25%; cursor: pointer; padding: 10px; border-radius: 8px; transition: 0.2s; }
    .info:hover { background: rgba(255,255,255,0.05); }
    .display-title { font-size: 1.3rem; font-weight: 900; color: white; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .display-artist { font-size: 0.9rem; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .controls { width: 50%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .play-btn { background: var(--accent); color: black; border-radius: 50%; width: 50px; height: 50px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .play-btn:hover { transform: scale(1.1); }
    .progress-bar { width: 100%; height: 6px; background: #333; border-radius: 10px; cursor: pointer; position: relative; }
    .progress-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 10px; pointer-events: none; will-change: width; }

    /* Loading animation for search */
    @keyframes spin { 100% { transform: rotate(360deg); } }
    /* TOAST NOTIFICATIONS */
    #toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(50px); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 30px; font-size: 0.9rem; z-index: 100; opacity: 0; transition: 0.3s; border: 1px solid var(--accent); backdrop-filter: blur(10px); pointer-events: none; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    /* RETRY CSS (MODERN OVERLAY) */
    #retry-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: calc(100vh - 100px); background: rgba(0,0,0,0.9); backdrop-filter: blur(25px); z-index: 20; padding: 40px 100px; opacity: 0; transform: translateY(30px); transition: opacity 0.4s ease, transform 0.4s ease; flex-direction: column; align-items: center; border-bottom: 1px solid #222; }
    body.retry-mode #retry-overlay { display: flex; opacity: 1; transform: translateY(0); }
    .retry-item { width: 100%; max-width: 900px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; margin-bottom: 20px; padding: 20px; cursor: pointer; transition: 0.2s; position: relative; display: flex; flex-direction: column; gap: 8px; }
    .retry-item:hover { background: rgba(76,194,255,0.08); border-color: rgba(76,194,255,0.3); }
    .retry-item.selected { border-color: var(--accent); box-shadow: 0 0 20px rgba(76,194,255,0.3); }
    .retry-tick { position: absolute; top: 20px; right: 20px; color: var(--accent); opacity: 0; transform: scale(0.5); transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
    .retry-item:hover .retry-tick { opacity: 0.5; transform: scale(1); }
    .retry-check-btn { width: 40px; height: 40px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); transition: 0.2s; font-size: 24px;}
    .retry-check-btn:hover { background: #ff4c4c; color: white; }
    
    /* PREVIEW MODAL */
    #retry-preview-modal { display: none; position: fixed; top: 5%; left: 10%; width: 80%; height: 80%; background: #111; border: 1px solid #333; border-radius: 12px; z-index: 30; padding: 30px; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
    #retry-preview-modal.active { display: flex; }
  </style>
</head>
<body>
  <div id="bg-blur"></div>
  <div id="toast"></div>
  
  <div class="main">
    <div class="sidebar">
      <div class="top-controls">
        <div class="dropdown">
          <button class="btn" style="flex:1; justify-content:center"><span class="material-icons-round">delete_sweep</span> Clear</button>
          <div class="dropdown-content">
            <a onclick="clearQueue('all')">Clear All (Keep Current)</a>
            <a onclick="clearQueue('recents')">Clear Recents (Above Current)</a>
          </div>
        </div>
        <button class="btn" style="width:auto; padding: 12px;" onclick="document.getElementById('fld').click()" title="Add Folder"><span class="material-icons-round" style="margin:0">create_new_folder</span></button>
        <button class="btn" style="width:auto; padding: 12px;" onclick="document.getElementById('fls').click()" title="Add to Bottom"><span class="material-icons-round" style="margin:0">add_box</span></button>
        <button class="btn" style="width:auto; padding: 12px;" onclick="document.getElementById('fls-next').click()" title="Add Next"><span class="material-icons-round" style="margin:0">queue_play_next</span></button>
      </div>
      
      <input type="file" id="fld" webkitdirectory style="display:none">
      <input type="file" id="fls" multiple style="display:none">
      <input type="file" id="fls-next" multiple style="display:none">
      
      <input type="text" class="search-box" id="sidebar-search" placeholder="Search to Play Next..." oninput="filterQueue(this.value, 'queue-list')">
      
      <div class="list-container" id="queue-list" onscroll="handleManualScroll(event)"></div>
    </div>

    <div style="flex:1; display:flex; flex-direction:column; position:relative;">
      
      <div class="imm-search-container">
        <span class="material-icons-round" style="color:var(--dim)">search</span>
        <input type="text" class="imm-search-input" id="imm-search" placeholder="Search queue & online to play next..." oninput="filterQueue(this.value, 'imm-search-results', true)">
      </div>
      <div class="imm-search-results" id="imm-search-results"></div>
      <div id="retry-overlay">
        <div style="width:100%; max-width:900px; display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
          <h1 style="font-weight:900;">Alternative Lyrics</h1>
          <span class="material-icons-round retry-check-btn" onclick="exitRetryUI()" style="cursor:pointer">close</span>
        </div>
        <div style="overflow-y:auto; width:100%; flex:1; display:flex; flex-direction:column; align-items:center;" id="retry-results-container"></div>
      </div>

      <div id="retry-preview-modal">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
          <button class="btn" style="width:auto" onclick="closeRetryPreview()">Back to Results</button>
          <span class="material-icons-round retry-check-btn" onclick="selectRetryLyrics()" style="color:var(--accent); background:rgba(76,194,255,0.1); cursor:pointer;">check_circle</span>
        </div>
        <div id="preview-full-lyrics" style="overflow-y:auto; flex:1; color:var(--dim); line-height:1.6; font-family:monospace; padding-bottom: 20px;"></div>
      </div>

      <img id="album-cover" class="album-cover" src="" style="display: none;">
      <div class="lyrics-view" id="l-view"><div id="l-content"></div></div>
      
      <div class="basic-lyrics-btn" onclick="toggleImmersive()" title="Toggle Immersive Lyrics">
        <span class="material-icons-round">lyrics</span>
      </div>

      <div class="lyric-tools">
        <div class="sync-ui" id="sync-ui">
          <span class="material-icons-round tool-btn" onmousedown="startSync(-0.2)" onmouseup="stopSync()" onmouseleave="stopSync()">remove</span>
          
          <input type="text" id="sync-val" 
                 value="0.0s" 
                 onchange="manualSyncInput(this.value)"
                 style="background:transparent; border:none; color:white; font-weight:bold; font-family:monospace; width:60px; text-align:center; outline:none; cursor:text;">
          
          <span class="material-icons-round tool-btn" onmousedown="startSync(0.2)" onmouseup="stopSync()" onmouseleave="stopSync()">add</span>
        </div>
        
        <span class="material-icons-round tool-btn" id="btn-ai-sync" onclick="triggerManualAIGeneration()" title="AI Auto-Sync (Fast)" style="display:none; color:var(--accent); text-shadow: 0 0 10px var(--accent);">auto_awesome</span>
        
        <span class="material-icons-round tool-btn" id="btn-sync" onclick="toggleSyncUI()" title="Adjust Sync">timer</span>
        <span class="material-icons-round tool-btn" id="btn-retry" onclick="triggerRetryUI()" title="Retry Alternative Lyrics">sync</span>
        <span class="material-icons-round tool-btn" id="btn-nolyrics" onclick="toggleNoLyrics()" title="Disable Lyrics">block</span>
        <span class="material-icons-round tool-btn" id="btn-edit" onclick="toggleEditMode()" title="In-Place Edit Lyrics">edit</span>
      </div>


      <div class="hover-queue-hitbox"></div>
      <div class="hover-queue" id="hover-q">
        <h3 style="margin-bottom: 15px; color: var(--dim); font-size: 0.9rem;">Coming Up Next</h3>
        <div class="list-container" id="hover-queue-list"></div>
      </div><span class="material-icons-round queue-hint">chevron_left</span>
    </div>
  </div>

  <div class="player-bar">
    <div class="info" onclick="toggleImmersive()" title="Click to toggle Immersive View">
      <div class="display-title" id="cur-t">No Song</div>
      <div class="display-artist" id="cur-a">Ready</div>
    </div>
    <div class="controls">
      <div style="display:grid; grid-template-columns: 1fr auto 1fr; width:100%; align-items:center; margin-bottom: 8px; gap: 25px;">
        
        <div style="display:flex; gap:25px; justify-content:flex-end; align-items:center;">
            <span class="material-icons-round" id="btn-toggle-lyrics" onclick="toggleLyrics()" style="cursor:pointer;" title="Toggle Lyrics CPU Mode">subtitles</span>
            <span class="material-icons-round" onclick="shuffleRemaining()" style="cursor:pointer; color:var(--dim)" title="Shuffle Remaining">shuffle</span>
            <span class="material-icons-round" onclick="playPrev()" style="cursor:pointer">skip_previous</span>
        </div>

        <div style="display:flex; justify-content:center;">
            <button class="play-btn" onclick="togglePlay()"><span class="material-icons-round" id="p-icon" style="font-size:32px">play_arrow</span></button>
        </div>
        
        <div style="display:flex; gap:25px; justify-content:flex-start; align-items:center;">
            <span class="material-icons-round" onclick="playNext()" style="cursor:pointer">skip_next</span>
        </div> 
      </div>
      
      <div style="width:100%; display:flex; align-items:center; gap:12px">
        <small id="c-time" style="width:40px">0:00</small>
        <div class="progress-bar" id="pb"><div class="progress-fill" id="fill"></div></div>
        <small id="t-time" style="width:40px">0:00</small>
      </div>    
    </div>
    <div style="width:25%; display:flex; justify-content:flex-end; align-items:center;">
      <span class="material-icons-round" style="margin-right:10px; color:var(--dim)">volume_up</span>
      <input type="range" id="vol" min="0" max="1" step="0.01" value="1">
    </div>
  </div>

  <audio id="player"></audio>

  <script>
    let toastTimeout;
function showToast(msg) {
    const toast = document.getElementById('toast');
    if(!toast) return;
    toast.innerText = msg;
    toast.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => toast.classList.remove('show'), 4000);
}
    // Checks computer memory to see if you left lyrics ON or OFF last time
    let lyricsEnabled = localStorage.getItem('lyricsEnabled') !== 'false';
    const { webUtils, ipcRenderer } = require('electron');
    const fs = require('fs');
    const path = require('path');

    let queue = [], curIdx = 0, lyrics = [], lyrIdx = -1;
    let draggedIdx = null;
    let currentSongId = ""; 
    let songSyncOffset = 0; 
    let isEditing = false;
    let isUserScrolling = false;
    let lyricScrollTimeout; 

    const audio = document.getElementById('player');
    const lContent = document.getElementById('l-content');
    const lView = document.getElementById('l-view');
    const volSlider = document.getElementById('vol');

    ipcRenderer.on('open-external-file', (event, filePath) => {
      const baseName = path.basename(filePath, '.mp3');
      let artist = "Unknown Artist", title = baseName;
      const dashIndex = baseName.indexOf('-');
      if (dashIndex !== -1) { artist = baseName.substring(0, dashIndex).trim(); title = baseName.substring(dashIndex + 1).trim(); }
      queue.push({ t: title, a: artist, p: filePath });
      draw(); saveState(); play(queue.length - 1);
    });

    window.onload = () => {
      const btn = document.getElementById('btn-toggle-lyrics');
      if (btn) {
        btn.style.color = lyricsEnabled ? 'var(--accent)' : 'var(--dim)';
        btn.innerText = lyricsEnabled ? 'subtitles' : 'subtitles_off';
      }
      volSlider.value = localStorage.getItem('playerVol') || 1;
      audio.volume = volSlider.value;
      const savedQueue = localStorage.getItem('playerQueue');
      if(savedQueue) {
        queue = JSON.parse(savedQueue);
        curIdx = parseInt(localStorage.getItem('playerIdx')) || 0;
        draw();
        if(queue.length > 0) {
          const s = queue[curIdx];
          document.getElementById('cur-t').innerText = s.t;
          document.getElementById('cur-a').innerText = s.a;
          currentSongId = s.a + " - " + s.t;
          updateToolIcons();
          if(s.isOnline) {
            audio.src = s.p;
            document.getElementById('album-cover').src = s.cover;
            document.getElementById('album-cover').style.display = "block";
            document.getElementById('bg-blur').style.backgroundImage = `url(${s.cover})`;
          } else {
            audio.src = `file://${s.p.replace(/\\/g, '/')}`; 
            extractAlbumArt(s);
          }
          getLyrics(s);
          scrollToCurrentSong();
        }
      }
    };

    volSlider.oninput = () => { audio.volume = volSlider.value; localStorage.setItem('playerVol', volSlider.value); };

    function saveState() {
      localStorage.setItem('playerQueue', JSON.stringify(queue));
      localStorage.setItem('playerIdx', curIdx);
    }

    function toggleImmersive() { document.body.classList.toggle('immersive'); scrollToCurrentSong();}
    
    function clearQueue(type) {
      if(queue.length === 0) return;
      if(type === 'all') { const curr = queue[curIdx]; queue = [curr]; curIdx = 0; } 
      else if(type === 'recents') { queue.splice(0, curIdx); curIdx = 0; }

    // --- HYBRID SEARCH LOGIC (LOCAL + GLOBAL) ---
    let searchTimeout;
    function filterQueue(query, targetId, isImmersive = false) {
      const target = document.getElementById(targetId);
      if(!query) { 
        if(isImmersive) target.style.display = 'none';

          let icon = s.isOnline ? "cloud" : "audiotrack";

      html += `<div id="${targetId}-online" style="max-height: 250px; overflow-y: auto; padding-right: 5px;"><div style="padding:15px; color:var(--dim); text-align:center; font-size: 0.85rem; display:flex; justify-content:center; align-items:center; gap:8px;">                <span class="material-icons-round" style="animation: spin 1s linear infinite;">sync</span> Searching the world...
               </div></div>`;

      target.innerHTML = html;
      if(isImmersive) target.style.display = 'block';

      // 3. Trigger Global Fetch (Debounced to prevent spamming the API)
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => fetchOnlineSearch(query, `${targetId}-online`), 800);
    }

   async function fetchOnlineSearch(query, containerId) {
      const container = document.getElementById(containerId);
      if(!container) return;

      try {
        // Upgraded to the ultimate, stable API with a 40-song limit
        let res = await fetch(`https://saavn.sumit.co/api/search/songs?query=${encodeURIComponent(query)}&limit=40`);
        
        if (!res.ok) throw new Error("API Blocked");
        
        let json = await res.json();
        // The new API puts the songs inside data.results
        let results = (json.data && json.data.results) ? json.data.results : [];

        if (results.length > 0) {
          let html = "";
          
          results.forEach(song => {
            let title = (song.name || "Unknown").replace(/&quot;/g, '"').replace(/&amp;/g, '&');
            
            // Safely grab the main artist
            let artist = "Unknown";
            if (song.artists && song.artists.primary && song.artists.primary.length > 0) {
                artist = song.artists.primary[0].name.replace(/&quot;/g, '"').replace(/&amp;/g, '&');
            }

            // Grab the highest resolution album cover
            let cover = "";
            if (song.image && song.image.length > 0) {
                cover = song.image[song.image.length - 1].url;
            }
            
            // Grab the highest quality 320kbps audio stream
            let downloadLink = "";
            if (song.downloadUrl && song.downloadUrl.length > 0) {
                downloadLink = song.downloadUrl[song.downloadUrl.length - 1].url;
            }

            if (downloadLink) {
              let safeT = title.replace(/'/g, "\\'").replace(/"/g, '&quot;');
              let safeA = artist.replace(/'/g, "\\'").replace(/"/g, '&quot;');
              let safeC = cover ? cover.replace(/'/g, "\\'").replace(/"/g, '&quot;') : '';
              let safeDL = downloadLink.replace(/'/g, "\\'").replace(/"/g, '&quot;');

              html += `
              <div class="item" onclick="addNextOnline('${safeT}', '${safeA}', '${safeC}', '${safeDL}')" style="cursor:pointer; border-left: 3px solid #4cc2ff; align-items: center; padding: 8px 10px;">
                <img src="${cover}" style="width:40px; height:40px; border-radius:6px; margin-right:12px; object-fit:cover; box-shadow: 0 4px 8px rgba(0,0,0,0.5);">
                <div style="flex:1; display:flex; flex-direction:column; justify-content:center; overflow:hidden; pointer-events:none;">
                  <div style="color:white; font-size:0.95rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                    <span class="material-icons-round" style="font-size:14px; color:var(--dim); vertical-align:middle; margin-right:4px;">cloud_download</span>${title}
                  </div>
                  <div style="color:var(--dim); font-size:0.8rem; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                    ${artist}
                  </div>
                </div>
              </div>`;
            }
          });
          
          container.innerHTML = html || `<div style="padding:10px; color:var(--dim); text-align:center; font-size: 0.85rem;">No playable streams found.</div>`;
        } else {
          container.innerHTML = `<div style="padding:10px; color:var(--dim); text-align:center; font-size: 0.85rem;">No global results found.</div>`;
        }
      } catch (e) {
        container.innerHTML = `<div style="padding:10px; color:#ff4c4c; text-align:center; font-size: 0.85rem;">Online Search Offline (${e.message}). Try again.</div>`;
        console.error("Search Error for query:", query, e);
      }
    }

    function addNextOnline(title, artist, cover, url) {
      const newSong = { t: title, a: artist, p: url, isOnline: true, cover: cover };
      const insertPos = queue.length === 0 ? 0 : curIdx + 1;
      queue.splice(insertPos, 0, newSong);
      
      document.getElementById('sidebar-search').value = '';
      document.getElementById('imm-search').value = '';
      document.getElementById('imm-search-results').style.display = 'none';

      draw(); saveState();
      
      if (queue.length === 1) play(0);

      setTimeout(() => {
        const qList = document.getElementById('queue-list');
        const hList = document.getElementById('hover-queue-list');
        if(qList && qList.children[insertPos]) qList.children[insertPos].scrollIntoView({ behavior: 'smooth', block: 'center' });
        if(hList && hList.children[insertPos]) hList.children[insertPos].scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);

        const hq = document.getElementById('hover-q');
        hq.classList.add('force-open');

    function playNextSearch(origIdx) {
      if(origIdx === curIdx) return;
      const item = queue.splice(origIdx, 1)[0];
      if(origIdx < curIdx) curIdx--; 
      queue.splice(curIdx + 1, 0, item);
      draw(); saveState();
      
      document.getElementById('sidebar-search').value = '';
      document.getElementById('imm-search').value = '';
      document.getElementById('imm-search-results').style.display = 'none';
      draw(); 

      setTimeout(() => {
        const qList = document.getElementById('queue-list');
        const hList = document.getElementById('hover-queue-list');

        if(qList.children[newPos]) qList.children[newPos].scrollIntoView({ behavior: 'smooth', block: 'center' });
        if(hList.children[newPos]) hList.children[newPos].scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);

      if(document.body.classList.contains('immersive')) {
        const hq = document.getElementById('hover-q');
        hq.classList.add('force-open');
        setTimeout(() => hq.classList.remove('force-open'), 2000);
      }
    }

    // --- TRACKPAD SWIPE & KEYBOARD CONTROLS ---
    let swipeCooldown = false;
    window.addEventListener('wheel', (e) => {
      if(swipeCooldown) return;
      
      // Only trigger if horizontal swipe is strong AND larger than any accidental vertical movement
      if (Math.abs(e.deltaX) > 50 && Math.abs(e.deltaX) > Math.abs(e.deltaY)) { 
        swipeCooldown = true;
        if (e.deltaX > 0) playNext();
        else playPrev();
        setTimeout(() => swipeCooldown = false, 800); 
      }
    }, { passive: true });

    window.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;

      if (e.key === 'MediaTrackNext') playNext();
      if (e.key === 'MediaTrackPrevious') playPrev();
      if (e.key === 'MediaPlayPause') togglePlay();

      if (e.key === 'ArrowUp') {
        e.preventDefault(); 
        audio.volume = Math.min(1, audio.volume + 0.05);
        volSlider.value = audio.volume;
        localStorage.setItem('playerVol', audio.volume);
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault(); 
        audio.volume = Math.max(0, audio.volume - 0.05);
        volSlider.value = audio.volume;
        localStorage.setItem('playerVol', audio.volume);
      }
      if (e.key === 'ArrowRight') {
        if(audio.duration) audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
      }
      if (e.key === 'ArrowLeft') {
        if(audio.duration) audio.currentTime = Math.max(0, audio.currentTime - 10);
      }
    });

    if ('mediaSession' in navigator) {
      navigator.mediaSession.setActionHandler('play', () => togglePlay());
      navigator.mediaSession.setActionHandler('pause', () => togglePlay());
      navigator.mediaSession.setActionHandler('nexttrack', () => playNext());
      navigator.mediaSession.setActionHandler('previoustrack', () => playPrev());
    }

    function dragStart(e, i) { 
      e.dataTransfer.setData('text/plain', i); 
      // Ghost effect
      setTimeout(() => e.target.style.opacity = '0.01', 0); 
    }

    function dragEnd(e) { 
      e.target.style.opacity = '1'; 
      draw(); 
    }

    function dragOver(e) { 
      e.preventDefault(); 
      
      // 1. YOUR ORIGINAL FEATURE: Auto-scroll the list if you drag near the edges
      const container = e.currentTarget.closest('.list-container');
      if(container) {
        const cRect = container.getBoundingClientRect();
        const y = e.clientY - cRect.top;
        if(y < 60) container.scrollTop -= (60 - y) * 0.4; 
        else if(y > cRect.height - 60) container.scrollTop += (y - (cRect.height - 60)) * 0.4; 
      }

      // 2. NEW FEATURE: Perfect blue line placement using box-shadow
      const rect = e.currentTarget.getBoundingClientRect();
      if (e.clientY > rect.top + rect.height / 2) {
        e.currentTarget.style.boxShadow = '0 2px 0 var(--accent)';
      } else {
        e.currentTarget.style.boxShadow = '0 -2px 0 var(--accent)';
      }
    }

    function dragLeave(e) { 
      e.currentTarget.style.boxShadow = ''; 
    }

    function drop(e, i) {
      e.preventDefault(); 
      e.stopPropagation();
      e.currentTarget.style.boxShadow = '';
      
      const fromText = e.dataTransfer.getData('text/plain');
      
      // 3. YOUR ORIGINAL FEATURE: If it's a file from your desktop, insert it!
      if (!fromText && e.dataTransfer.files.length > 0) {
        insertFilesAt(e.dataTransfer.files, i);
        return;
      }

      // 4. NEW FEATURE: Perfect Reordering Math
      const from = parseInt(fromText);
      if (from === i || isNaN(from)) return;
      
      const rect = e.currentTarget.getBoundingClientRect();
      let insertAt = i;
      
      if (e.clientY > rect.top + rect.height / 2) insertAt++;
      if (from < insertAt) insertAt--;
      if (from === insertAt) return; 

      const [moved] = queue.splice(from, 1);
      queue.splice(insertAt, 0, moved);
      
      if (curIdx === from) curIdx = insertAt; 
      else if (from < curIdx && insertAt >= curIdx) curIdx--; 
      else if (from > curIdx && insertAt <= curIdx) curIdx++;
      
      draw(); saveState();
    }

    // --- HOLD TO SYNC LOGIC ---
    let syncHoldInterval;

    function startSync(val) {
        adjSync(val); // Fire once immediately on click
        
        // If they keep holding it down, fire it repeatedly every 150 milliseconds
        syncHoldInterval = setInterval(() => {
            adjSync(val);
        }, 150); 
    }

    function stopSync() {
        clearInterval(syncHoldInterval); // Stop firing when they let go or drag the mouse away
    }

    function manualSyncInput(val) {
    // Strip out the "s" and other text
    let numericVal = parseFloat(val.replace(/[^\d.-]/g, ''));
    
    if (isNaN(numericVal)) {
        // Reset UI to current state if input is invalid
        document.getElementById('sync-val').value = (songSyncOffset > 0 ? '+' : '') + songSyncOffset.toFixed(1) + 's';
        return;
    }

    // Update global variable and save to storage
    songSyncOffset = numericVal;
    localStorage.setItem('sync_' + currentSongId, songSyncOffset.toFixed(1));
    
    // Refresh UI to show the clean formatted string
    document.getElementById('sync-val').value = (songSyncOffset > 0 ? '+' : '') + songSyncOffset.toFixed(1) + 's';
    showToast(`Sync offset saved: ${songSyncOffset.toFixed(1)}s`);
}

    function adjSync(val) {
    // 1. Update the math
    songSyncOffset += val;

    // 2. Save the preference for this specific song
    localStorage.setItem('sync_' + currentSongId, songSyncOffset.toFixed(1));

    // 3. Update the INPUT field value (using .value instead of .innerText)
    const input = document.getElementById('sync-val');
    if (input) {
        // We keep your logic for showing the '+' sign for positive numbers
        input.value = (songSyncOffset > 0 ? '+' : '') + songSyncOffset.toFixed(1) + 's';
    }
}

    function getCleanTitle(s) {
      // The new .replace(/_/g, ' ') translates underscores into spaces behind the scenes!
      return s.t.replace(/\(.*\)|\[.*\]|\{.*\}/g, '')
                .replace(/lyrical|audio|video|official/gi, '')
                .replace(/_/g, ' ') 
                .trim();
    }

async function triggerRetryUI() {
    if (!queue[curIdx]) return;
    document.body.classList.add('retry-mode');
    document.body.classList.remove('immersive'); 

    const container = document.getElementById('retry-results-container');

    const s = queue[curIdx];
    const q = `${encodeURIComponent((s.a || '') + ' ' + getCleanTitle(s))}`;
    const headers = { 'User-Agent': 'music-player-mass/1.0.0 (https://github.com/mahitmass/music_with_LYRICS)' };
    
    // The beautiful AI Re-Generate button we will inject at the bottom
    const aiRetryButtonHTML = `
        <div class="retry-item" onclick="exitRetryUI(); triggerManualAIGeneration();" style="text-align:center; border: 1px dashed rgba(76,194,255,0.4); background: rgba(76,194,255,0.05); margin-top: 10px;">

            </div>
            <div style="color:rgba(255,255,255,0.5); font-size:0.85rem; margin-top:5px">Ignore database and use local AI transcription</div>
        </div>
    `;

    try {
        let res = await fetch(`https://lrclib.net/api/search?q=${q}`, { headers });
        if (!res.ok) throw new Error("Database offline");
        
        let data = await res.json();
        if (!data) data = [];
        
        let timed = data.filter(d => d.syncedLyrics);
        let plain = data.filter(d => !d.syncedLyrics && d.plainLyrics);
        currentRetryData = [...timed.slice(0, 3), ...plain.slice(0, 6 - Math.min(3, timed.length))];

        if(currentRetryData.length === 0) {
            // If database is empty, show the AI button alone!
            container.innerHTML = `
                <p style="padding:30px; color:var(--dim); text-align:center">No alternative lyrics found in database.</p>

        }

        currentRetryData.forEach((result, index) => {
            const isSynced = !!result.syncedLyrics;

            const labelColor = isSynced ? "var(--accent)" : "#888";
            
            const fullLrc = result.syncedLyrics || result.plainLyrics || "No text available.";
            let lines = fullLrc.split('\n');
            let plainLines = lines.map(l => l.replace(/\[\d{2}:\d{2}\.\d+\]/g, '').trim()).filter(l => l.length > 0);
            let previewText = plainLines.slice(0, 2).join('<br>') || "Instrumental or plain text.";
            const durText = result.duration ? `${Math.floor(result.duration/60)}:${Math.floor(result.duration%60).toString().padStart(2,'0')}` : '?:??';

            html += `
            <div class="retry-item" onclick="openRetryPreview(${index})">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; padding-right:40px;">
                   <div style="padding-right: 10px;">
                      <div style="color:white; font-size:1.1rem; font-weight:700;">${result.trackName}</div>
                      <div style="color:var(--dim); font-size:0.9rem; margin-bottom:5px">${result.artistName}</div>
                   </div>
                   <div style="display:flex; gap:8px; align-items:center; margin-top:3px;">
                      <div style="font-size: 0.7rem; font-weight: 700; color: #aaa; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; white-space: nowrap;">⏱ ${durText}</div>
                      <div style="font-size: 0.7rem; font-weight: 900; color: ${labelColor}; border: 1px solid ${labelColor}; padding: 2px 6px; border-radius: 4px; letter-spacing: 1px; white-space: nowrap;">${label}</div>
                   </div>
                </div>
                <div style="color:rgba(255,255,255,0.4); font-family:monospace; font-size:0.9rem; border-top:1px solid #222; padding-top:8px">${previewText}</div>
                <span class="material-icons-round retry-tick"

        });
        
        // Append the AI option at the very bottom of the results

    } catch(e) {
        container.innerHTML = `<p style="padding:50px; color:#ff4c4c; text-align:center">App Error: ${e.message}</p>`;
    }
}

function selectRetryLyrics() {
    if(selectedRetryIndex === null || !currentRetryData[selectedRetryIndex]) return;

    const result = currentRetryData[selectedRetryIndex];
    // FIX: Accept plain text if synced is not available
    const finalLyrics = result.syncedLyrics || result.plainLyrics;
    const s = queue[curIdx];

    if(!finalLyrics) {
        alert("This version has no text at all. Cannot select.");
        return;
    }

    if (!s.isOnline) {
        const lDir = path.join(path.dirname(s.p), 'Lyrics');
        const lPath = path.join(lDir, s.a + ' - ' + getCleanTitle(s) + '.lrc');
        if(!fs.existsSync(lDir)) fs.mkdirSync(lDir);
        fs.writeFileSync(lPath, finalLyrics);
    } else {
        localStorage.setItem('lyric_custom_' + (s.id || s.p), finalLyrics);
    }
    
    show(finalLyrics);
    localStorage.removeItem('apiEmpty_' + (s.id || s.p)); 
    closeRetryPreview();
    exitRetryUI();
}

    function insertFilesAt(files, index) {
      const news = Array.from(files).filter(f => f.name.endsWith('.mp3')).map(f => {
        const fullPath = webUtils.getPathForFile(f); 
        const baseName = f.name.replace('.mp3', '');
        let artist = "Unknown Artist", title = baseName;
        const dashIndex = baseName.indexOf('-');
        if (dashIndex !== -1) { artist = baseName.substring(0, dashIndex).trim(); title = baseName.substring(dashIndex + 1).trim(); }
        return { t: title, a: artist, p: fullPath };
      });

      if(news.length > 0) {
        const wasEmpty = queue.length === 0;
        queue.splice(index, 0, ...news); 
        if (!wasEmpty && index <= curIdx) curIdx += news.length; 
        draw(); saveState();
        if(wasEmpty) play(0);
        
        setTimeout(() => {
          const qList = document.getElementById('queue-list');
          const hList = document.getElementById('hover-queue-list');
          if(qList && qList.children[index]) qList.children[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
          if(hList && hList.children[index]) hList.children[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
      }
    }

    document.getElementById('fld').onchange = (e) => { insertFilesAt(e.target.files, queue.length); e.target.value = ''; };
    document.getElementById('fls').onchange = (e) => { insertFilesAt(e.target.files, queue.length); e.target.value = ''; };
    document.getElementById('fls-next').onchange = (e) => { 
      const insertPos = queue.length === 0 ? 0 : curIdx + 1;
      insertFilesAt(e.target.files, insertPos); 
      e.target.value = ''; 
    };

    document.querySelector('.sidebar').addEventListener('dragover', e => e.preventDefault());
    document.querySelector('.sidebar').addEventListener('drop', e => {
      e.preventDefault(); e.stopPropagation();
      if (draggedIdx === null && e.dataTransfer.files.length > 0) insertFilesAt(e.dataTransfer.files, queue.length);
    });

// --- AUTO-SCROLL QUEUE (SILENT BACKGROUND SCROLL) ---
function scrollToCurrentSong() {
    if(queue.length === 0) return;
    
    setTimeout(() => {
        const isImmersive = document.body.classList.contains('immersive');
        
        // ONLY scroll the list that is currently visible to prevent layout glitches!
        if (isImmersive) {
            const hList = document.getElementById('hover-queue-list');
            if(hList && hList.children[curIdx]) {
                const item = hList.children[curIdx];
                hList.scrollTo({ top: item.offsetTop - (hList.clientHeight / 2) + (item.clientHeight / 2), behavior: 'smooth' });
            }
        } else {
            const qList = document.getElementById('queue-list');
            if(qList && qList.children[curIdx]) {
                const item = qList.children[curIdx];
                qList.scrollTo({ top: item.offsetTop - (qList.clientHeight / 2) + (item.clientHeight / 2), behavior: 'smooth' });
            }
        }
    }, 100); 
}

    function draw() {
      const searchTerm = document.getElementById('sidebar-search').value;
      if(searchTerm) return; 
      
      const qList = document.getElementById('queue-list');
      const hList = document.getElementById('hover-queue-list');
      
      // 1. Save exactly where the user is currently scrolled!
      const qScroll = qList ? qList.scrollTop : 0;
      const hScroll = hList ? hList.scrollTop : 0;

      const html = queue.map((s, i) => {
        let icon = s.isOnline ? "cloud" : "drag_indicator";
        return `
        <div class="item ${i===curIdx?'active':''}" draggable="true" ondragstart="dragStart(event, ${i})" ondragend="dragEnd(event)" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="drop(event, ${i})" onclick="play(${i})">
          <div class="item-left"><span class="material-icons-round drag-handle">${icon}</span> ${i+1}. ${s.t}</div>
          <div class="del-btn" onclick="event.stopPropagation(); queue.splice(${i}, 1); if(${i} < curIdx) curIdx--; else if(${i} === curIdx && queue.length > 0) play(curIdx >= queue.length ? 0 : curIdx); draw(); saveState();">✕</div>        </div>
      `}).join('');
      
      if(qList) qList.innerHTML = html;
      if(hList) hList.innerHTML = html;
      
      // 2. Instantly restore their scroll position so it never jumps!
      if(qList) qList.scrollTop = qScroll;
      if(hList) hList.scrollTop = hScroll;
    }

    function play(i) {
      if(i < 0 || i >= queue.length) return;
      curIdx = i; const s = queue[i];
      isUserScrolling = false;
      document.getElementById('cur-t').innerText = s.t;
      document.getElementById('cur-a').innerText = s.a;
      
      currentSongId = s.id || s.p;
      updateToolIcons();
      draw(); saveState();
      
      // TRIGGER THE SCROLL EXACTLY HERE
      scrollToCurrentSong();
      
      // Online routing vs Local routing
      if(s.isOnline) {
        audio.src = s.p;
        audio.play().catch(e => console.error(e));
        document.getElementById('album-cover').src = s.cover;
        document.getElementById('album-cover').style.display = "block";
        document.getElementById('bg-blur').style.backgroundImage = `url(${s.cover})`;
      } else {
        audio.src = `file://${s.p.replace(/\\/g, '/')}`; 
        audio.play().catch(e => console.error(e));
        extractAlbumArt(s); 
      }
      
      if ('mediaSession' in navigator) navigator.mediaSession.metadata = new MediaMetadata({ title: s.t, artist: s.a });
      getLyrics(s);
    }

    function extractAlbumArt(song) {
      const coverImg = document.getElementById('album-cover');
      const bgBlur = document.getElementById('bg-blur');
      fetch(`file://${song.p.replace(/\\/g, '/')}`).then(res => res.blob()).then(blob => {
          window.jsmediatags.read(blob, {
            onSuccess: function(tag) {
              const picture = tag.tags.picture;
              if (picture) {
                let b64 = ""; const bytes = new Uint8Array(picture.data);
                for (let i = 0; i < bytes.byteLength; i++) b64 += String.fromCharCode(bytes[i]);
                const b = "data:" + picture.format + ";base64," + window.btoa(b64);
                coverImg.src = b; coverImg.style.display = "block"; bgBlur.style.backgroundImage = `url(${b})`;
              } else fallbackArt(song.t);
            },
            onError: () => fallbackArt(song.t)
          });
        }).catch(() => fallbackArt(song.t));
    }

    function fallbackArt(title) {
      let hash = 0;
      for (let i = 0; i < title.length; i++) hash = title.charCodeAt(i) + ((hash << 5) - hash);
      const c1 = `hsl(${hash % 360}, 70%, 50%)`, c2 = `hsl(${(hash + 40) % 360}, 80%, 30%)`;
      document.getElementById('album-cover').style.display = "none";
      document.getElementById('bg-blur').style.backgroundImage = `linear-gradient(45deg, ${c1}, ${c2})`;
    }

// --- THE TIMESTAMP HIJACKER (ANCHORED INTERPOLATION) ---
function smartSyncPlainLyrics(aiLrc, plainText, audioDuration) {
    if (!plainText || plainText.trim().length === 0) return aiLrc; 
    
    const timeRegex = /\[(\d{2}:\d{2}\.\d{2,3})\](.*)/;
    let aiLines = aiLrc.split('\n').map(l => {
        let m = l.match(timeRegex);
        if(!m) return null;
        let timeSec = parseInt(m[1].split(':')[0]) * 60 + parseFloat(m[1].split(':')[1]);
        return { timeStr: m[1], timeSec: timeSec, clean: m[2].toLowerCase().replace(/[^\w\s]/g, ' ') };
    }).filter(Boolean);

    if(aiLines.length === 0) return aiLrc;

    let plainLines = plainText.split('\n').map(l => l.trim()).filter(l => l && !l.includes("Waking up") && !l.includes("Searching") && !l.includes("Only plain text") && !l.includes("No lyrics found") && !l.includes("AI is generating"));
    if (plainLines.length === 0) return aiLrc;

    let mapped = [];
    let aiIndex = 0;
    let lastTimeSec = -1;
    const stopWords = ['a', 'the', 'and', 'but', 'or', 'for', 'in', 'is', 'it', 'you', 'i', 'my', 'me', 'yeah', 'oh', 'ooh', 'ah', 'to', 'of', 'on'];

    // PASS 1: Anchor the obvious matches
    for (let i = 0; i < plainLines.length; i++) {
        let pLine = plainLines[i];
        let pClean = pLine.toLowerCase().replace(/[^\w\s]/g, ' ').trim();
        if(!pClean) {
            mapped.push({ text: pLine, timeSec: null });
            continue;
        }

        let bestMatchIdx = -1;
        let bestScore = 0;

        let pWords = pClean.split(/\s+/).filter(w => w.length > 1 && !stopWords.includes(w));
        if (pWords.length === 0) pWords = pClean.split(/\s+/).filter(w => w.length > 0); 

        for (let j = aiIndex; j < Math.min(aiIndex + 6, aiLines.length); j++) {
            let aClean = aiLines[j].clean;
            let matchCount = pWords.reduce((acc, w) => aClean.includes(w) ? acc + 1 : acc, 0);
            let score = matchCount / pWords.length;
            let timeDiff = aiLines[j].timeSec - lastTimeSec;

            // Must match, must move forward, max jump 20s
            if (score > bestScore && timeDiff >= 0.5 && timeDiff < 20) { 
                bestScore = score;
                bestMatchIdx = j;
            }
        }

        if (bestMatchIdx !== -1 && bestScore >= 0.3) { 
            lastTimeSec = aiLines[bestMatchIdx].timeSec;
            mapped.push({ text: pLine, timeSec: lastTimeSec });
            aiIndex = bestMatchIdx + 1; 
        } else {
            mapped.push({ text: pLine, timeSec: null }); // Leave missing lines blank for Pass 2
        }
    }

    // PASS 2: The Rubber Band (Interpolate the missing gaps)
    let result = [];
    let finalAudioDur = audioDuration || (aiLines[aiLines.length-1].timeSec + 10);

    for (let i = 0; i < mapped.length; i++) {
        if (mapped[i].timeSec === null) {
            // Find the last known time before this
            let prevTime = 0;
            for (let j = i - 1; j >= 0; j--) {
                if (mapped[j].timeSec !== null) { prevTime = mapped[j].timeSec; break; }
            }

            // Find the next known time ahead of this
            let nextTime = finalAudioDur;
            let nextIdx = mapped.length;
            for (let j = i + 1; j < mapped.length; j++) {
                if (mapped[j].timeSec !== null) { nextTime = mapped[j].timeSec; nextIdx = j; break; }
            }

            // Evenly divide the time between the gap
            let gapCount = (nextIdx - i) + 1; 
            let timeGap = (nextTime - prevTime) / gapCount;

            // Speed limit safeguard (don't stretch too far if it's the end of the song)
            if (timeGap > 4) timeGap = 2.5;

            mapped[i].timeSec = prevTime + timeGap;
        }

        // Format and push to final result
        let t = mapped[i].timeSec;
        let m = Math.floor(t / 60).toString().padStart(2, '0');
        let s = (t % 60).toFixed(2).padStart(5, '0');
        result.push(`[${m}:${s}] ${mapped[i].text}`);
    }

    return result.join('\n');
}

function processNextAITask() {
    if (aiTaskQueue.length === 0) {
        isAIBusy = false;
        currentAITask = null;
        return;
    }

    isAIBusy = true;
    const task = aiTaskQueue.shift();
    currentAITask = task.song;

    generateAILyrics(task.song).then((result) => {
        const s = result.song;
        let lrcText = result.lrc;
        
        if (task.plainText && task.plainText.length > 20) {
             lrcText = smartSyncPlainLyrics(lrcText, task.plainText, task.duration);
        }
        
        const lDir = path.join(path.dirname(s.p), 'Lyrics');
        const lPath = path.join(lDir, s.a + ' - ' + getCleanTitle(s) + '.lrc'); 
        if(!fs.existsSync(lDir)) fs.mkdirSync(lDir);
        fs.writeFileSync(lPath, lrcText);
        localStorage.removeItem('apiEmpty_' + (s.id || s.p)); 

        if (queue[curIdx] && queue[curIdx].p === s.p) {
            show(lrcText);
            updateAIButtons('none', '', false);
        } else {
            showToast(`Lyrics for "${s.t}" finished generating!`);
        }
        processNextAITask(); 
    }).catch(e => {
        showToast(`AI Failed for "${task.song.t}": ` + e.message);
        if (queue[curIdx] && queue[curIdx].p === task.song.p) {
            updateAIButtons('block', 'Retry AI Generation', false);
        }
        processNextAITask(); 
    });
}

function triggerManualAIGeneration() {
    const song = queue[curIdx];
    if (!song || song.isOnline) return;

    // Prevent double-clicking or adding a song that's already waiting!
    if (currentAITask?.p === song.p || aiTaskQueue.some(t => t.song.p === song.p)) {
        showToast("Already in AI queue!");
        return;
    }

    // THE SCRAPE: Grab the perfect plain text right off the UI before the AI starts!
    const plainTextElements = document.querySelectorAll('#l-content .lyric-line');
    const originalPlainText = Array.from(plainTextElements).map(p => p.innerText).join('\n');

    // Add to Queue
    aiTaskQueue.push({ song: song, plainText: originalPlainText, duration: audio.duration });

    updateAIButtons('block', 'AI is queued...', true);
    
    if (!isAIBusy) {
        showToast("✨ AI started! You can safely switch songs.");
        processNextAITask();
    } else {
        showToast(`Added to AI Queue (Position: ${aiTaskQueue.length})`);
    }
}



async function generateAILyrics(song) {
    return new Promise(async (resolve, reject) => {
        try {
            if (!aiWorker) aiWorker = new Worker('./ai-worker.js', { type: 'module' });

            // Use Electron's built-in Web Audio API to decode MP3 instantly (No FFMPEG needed!)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const fileBuffer = fs.readFileSync(song.p);
            const arrayBuffer = fileBuffer.buffer.slice(fileBuffer.byteOffset, fileBuffer.byteOffset + fileBuffer.byteLength);
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            const messageHandler = (event) => {
                const data = event.data;
                if (data.status === 'done' && data.songPath === song.p) {
                    aiWorker.removeEventListener('message', messageHandler);
                    resolve({ lrc: data.lrc, song: song });
                } else if (data.status === 'error' && data.songPath === song.p) {
                    aiWorker.removeEventListener('message', messageHandler);
                    reject(new Error(data.message));
                }
            };
            
            aiWorker.addEventListener('message', messageHandler);
            aiWorker.postMessage({ audioData: audioBuffer.getChannelData(0), songPath: song.p });
        } catch (error) { reject(error); }
    });
}

// --- FETCH LYRICS ---
async function getLyrics(s) {
  if (!lyricsEnabled) {
    lyrics = [];
    lContent.innerHTML = `<div style="padding: 20px; color: var(--dim); text-align: center; margin-top: 50%; transform: translateY(-50%); font-size: 0.95rem;">Lyrics are disabled to save power.</div>`;
    return;
  }

  try {
    const cSongId = s.id || s.p; 
    
    lyrics = []; 
    lyrIdx = -1;
    
    if(localStorage.getItem('noLyr_' + cSongId)) {
      lContent.innerHTML = '<p class="lyric-line" style="opacity: 1; filter:blur(0)">Lyrics disabled for this track.</p>';
      return;
    }
    
    let cleanTitle = getCleanTitle(s);
    let lDir, lPath;
    
    // 1. Local Read
    if (!s.isOnline) {
      lDir = path.join(path.dirname(s.p), 'Lyrics');
      lPath = path.join(lDir, s.a + ' - ' + cleanTitle + '.lrc');
      if(fs.existsSync(lPath)) { 
          show(fs.readFileSync(lPath, 'utf8')); 
          return;
      }
    } else {
      const savedCustom = localStorage.getItem('lyric_custom_' + cSongId);
      if (savedCustom) { show(savedCustom); return; }
    }

    if(s.isOnline && localStorage.getItem('apiEmpty_' + cSongId)) {
       lContent.innerHTML = '<p class="lyric-line" style="opacity: 1; filter:blur(0)">No lyrics in database.</p>';
       return;
    }

    lContent.innerHTML = '<p class="lyric-line" style="opacity: 1; filter: blur(0px);">Searching the database...</p>';
    
    const headers = { 'User-Agent': 'ProMediaPlayer/1.0.0 (https://github.com/mahitmass/music_with_LYRICS)' };
    let res = await fetch(`https://lrclib.net/api/search?track_name=${encodeURIComponent(cleanTitle)}&artist_name=${encodeURIComponent(s.a || '')}`, { headers });
    
    if (res.status === 429 || res.status === 403) {
      lContent.innerHTML = '<p class="lyric-line" style="opacity:1; color:#ff4c4c;">API Cooldown. Waiting...</p>'; return;
    }
    
    if (!res.ok) throw new Error(`API returned status ${res.status}`);

    let data = await res.json();
    if(!data || (!data[0]?.syncedLyrics && !data[0]?.plainLyrics)) {
        res = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent((s.a || '') + ' ' + cleanTitle)}`, { headers });
        if(res.ok) data = await res.json();
    }
    
    // --- SMART DURATION SORTING ---
    // If the audio is loaded, sort the database results so the closest track length is #1
    if (data && Array.isArray(data) && audio.duration > 0) {
        const targetDur = audio.duration;
        data.sort((a, b) => {
            const diffA = a.duration ? Math.abs(a.duration - targetDur) : 9999;
            const diffB = b.duration ? Math.abs(b.duration - targetDur) : 9999;
            return diffA - diffB; // Smallest difference moves to the top
        });
    }
    
    // Grab Synced first. If no synced, grab Plain.
    let finalLyrics = null;
    if (data && data[0]) {
        finalLyrics = data[0].syncedLyrics || data[0].plainLyrics || null;
    }

    if (finalLyrics) {
      const nativeScriptRegex = /[\u0400-\u04FF\u0370-\u03FF\u0900-\u0DFF\u0600-\u06FF\u3000-\u9FFF\uAC00-\uD7AF]/;
      if (nativeScriptRegex.test(finalLyrics)) {
        lContent.innerHTML = '<p class="lyric-line" style="opacity: 1; filter: blur(0px);">Searching for Romanized version...</p>';
        let romRes = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(cleanTitle + ' romanized')}`, { headers });
        if (romRes.ok) {
          let romData = await romRes.json();
          if (romData && romData[0]?.syncedLyrics && !nativeScriptRegex.test(romData[0].syncedLyrics)) {
            finalLyrics = romData[0].syncedLyrics;
          }
        }
      }
    }
    
    if(finalLyrics) {
      // INTERNET SUCCESS
      if (!s.isOnline) {
        if(!fs.existsSync(lDir)) fs.mkdirSync(lDir);
        fs.writeFileSync(lPath, finalLyrics);
      } else {
        localStorage.setItem('lyric_custom_' + cSongId, finalLyrics);
      }
      show(finalLyrics); 
      
    } else { 
      // INTERNET FAILED -> CHECK QUEUE OR SHOW GENERATE BUTTON
      const isSongInAIQueue = currentAITask?.p === s.p || aiTaskQueue.some(t => t.song.p === s.p);

      if (isSongInAIQueue) {
          lContent.innerHTML = '<p class="lyric-line" style="opacity: 1; filter: blur(0px);">AI is generating lyrics in background...</p>';
          updateAIButtons('block', 'AI is working...', true);
      } else if (!s.isOnline) {
          lContent.innerHTML = '<p class="lyric-line" style="opacity: 1; filter: blur(0px);">No lyrics found in database.</p>';
          showToast("No lyrics found. Click ✨ to Generate Locally.");
          updateAIButtons('block', 'Generate Lyrics with AI', false);
      } else {
          localStorage.setItem('apiEmpty_' + cSongId, "true");
          lContent.innerHTML = '<p class="lyric-line" style="opacity: 1; filter:blur(0)">No synced lyrics found in database.</p>'; 
      }
    }

  } catch(e) { 
    console.error("Lyric Fetch Error:", e);
    lContent.innerHTML = `<p class="lyric-line" style="opacity: 1; filter:blur(0); color:#ff4c4c;">App Error: ${e.message}</p>`;
  }
}

function show(lrc) {
    lContent.innerHTML = '';
    lyrics = [];
    lyrIdx = -1; // <--- THE BUG FIX FOR PLAIN TEXT SCROLLING
    
    const reg = /\[(\d{2}):(\d{2}\.\d+)\]/;
    const isSynced = reg.test(lrc);
    
    // Check if this song is currently in the AI oven
    const isSongInAIQueue = currentAITask?.p === queue[curIdx].p || aiTaskQueue.some(t => t.song.p === queue[curIdx].p);

    if (isSongInAIQueue) {
        updateAIButtons('block', 'AI is working...', true);
    } else if (!isSynced && queue[curIdx] && !queue[curIdx].isOnline) {
        showToast("Only plain text found. Click ✨ to Auto-Sync.");
        updateAIButtons('block', 'AI Auto-Sync Plain Text', false);
    } else {
        updateAIButtons('none', '', false);
    }

    lrc.split('\n').forEach(line => {
        if (isSynced) {
            const m = reg.exec(line);
            if(m) {
                const time = (parseInt(m[1])*60) + parseFloat(m[2]);
                const text = line.replace(reg,'').trim();
                
                if(text) {
                    lyrics.push({ time, text });
                    const p = document.createElement('p'); p.className='lyric-line'; p.innerText=text;
                    p.onclick = (e) => { 
                        if(isEditing || window.isGrabbing) { e.stopPropagation(); return; }
                        audio.currentTime = Math.max(0, time - songSyncOffset); 
                        if(audio.paused) audio.play(); 
                    };
                    
                    lContent.appendChild(p);
                }
            }
        } else {
            // It's Plain Text: Render it as a static lyric block without click-to-seek
            const text = line.trim();
            if(text) {
                const p = document.createElement('p'); p.className='lyric-line'; 
                p.style.cursor = 'default'; p.style.opacity = '0.7'; p.innerText=text;
                lContent.appendChild(p);
            }
        }
    });
}

audio.addEventListener('pause', () => document.getElementById('p-icon').innerText = 'play_arrow');
function togglePlay() { if(audio.src) audio.paused ? audio.play() : audio.pause(); }
function playNext() { 
  if (curIdx + 1 < queue.length) {
    play(curIdx + 1);
  } else {
    audio.pause();
    audio.currentTime = 0;
    document.getElementById('p-icon').innerText = 'play_arrow';
  }
}
    
    function playPrev() { 
      // If the song has been playing for 3 seconds, previous just restarts the track
      if (audio.currentTime > 3) { 
        audio.currentTime = 0; 
        return; 
      }
      // Otherwise, go back a song (or stop if it's the very first song)
      if (curIdx > 0) play(curIdx - 1); 
      else audio.currentTime = 0;
    }
    
    function shuffleRemaining() {
      if(queue.length <= curIdx + 1) return;
      const remaining = queue.slice(curIdx + 1);
      for(let i = remaining.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [remaining[i], remaining[j]] = [remaining[j], remaining[i]]; }
      queue = [...queue.slice(0, curIdx + 1), ...remaining]; draw(); saveState();
    }
    audio.onended = playNext;


    // --- SCROLL HANDLING ---


    function handleManualScroll(e) {
      if (typeof isEditing !== 'undefined' && isEditing) return;
      // Ignore tiny accidental trackpad bumps right after clicking
      if (e && e.type === 'wheel' && Math.abs(e.deltaY) < 10) return; 
      
      isUserScrolling = true;
      clearTimeout(lyricScrollTimeout);
      
      lyricScrollTimeout = setTimeout(() => {
        isUserScrolling = false;
        
        // FIX: If the song is paused, do NOT auto-snap back! Let the user read.
        if (audio.paused) return; 

        const ps = document.getElementsByClassName('lyric-line');
        const lView = document.getElementById('l-view');
        if (lView && typeof lyrIdx !== 'undefined' && lyrIdx >= 0 && ps[lyrIdx]) {
          lView.scrollTo({top: ps[lyrIdx].offsetTop - (lView.clientHeight/2) + 20, behavior:'smooth'});
        }
      }, 2000);
    }


    lView.addEventListener('wheel', handleManualScroll);
    lView.addEventListener('touchmove', handleManualScroll);
    lView.addEventListener('mousedown', handleManualScroll);

    audio.ontimeupdate = () => {
      if(!audio.duration) return;
      document.getElementById('fill').style.width = (audio.currentTime/audio.duration)*100 + '%';
      const fmt = s => `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
      document.getElementById('c-time').innerText = fmt(audio.currentTime);
      document.getElementById('t-time').innerText = fmt(audio.duration);

      // Only do the heavy math and scrolling if lyrics are actually enabled!
      if (lyricsEnabled && lyrics.length > 0) {
        let act = -1;
        const adjustedTime = audio.currentTime + songSyncOffset;
        for(let i=0; i<lyrics.length; i++) { if(adjustedTime >= lyrics[i].time) act = i; else break; }
        
        if(act !== -1 && act !== lyrIdx) {
          lyrIdx = act;
          const ps = document.getElementsByClassName('lyric-line');
          for(let p of ps) p.classList.remove('highlight');
          if(ps[act]) {
            ps[act].classList.add('highlight');
            if (!isEditing && !isUserScrolling) {
              lView.scrollTo({top: ps[act].offsetTop - (lView.clientHeight/2) + 20, behavior:'smooth'});
            }
          }
        }
      }
    };
    document.getElementById('pb').onclick = (e) => audio.currentTime = (e.offsetX / e.target.clientWidth) * audio.duration;
    
    // Double click background to toggle immersive view
    // --- CLICK AND HOLD (GRAB) TO TOGGLE ---
    window.isGrabbing = false;
    let grabTimer;
    const lViewEl = document.getElementById('l-view');

    lViewEl.addEventListener('mousedown', (e) => {
      if (isEditing) return;
      // Prevent this from triggering if you are just clicking the scrollbar!
      if (e.offsetX >= lViewEl.clientWidth - 15) return; 

      window.isGrabbing = false; // Reset on a new click
      
      // If you hold the mouse down for 400ms, it counts as a "Grab"
      grabTimer = setTimeout(() => {
        window.isGrabbing = true; // Activate the shield!
        toggleImmersive();
      }, 400); 
    });

    // If you lift your finger early or move away, cancel the grab timer
    lViewEl.addEventListener('mouseup', () => clearTimeout(grabTimer));
    lViewEl.addEventListener('mouseleave', () => clearTimeout(grabTimer));
  </script>
</body>
</html>
