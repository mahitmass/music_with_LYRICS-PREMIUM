name: Build Mac App

# This allows you to trigger the build manually from the GitHub website
on: 
  workflow_dispatch: 

jobs:
  build-mac:
    runs-on: macos-latest # Tells GitHub to use an Apple Mac server

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Mac (.dmg) files
        # 🔥 THE FIX: Added --x64 and --arm64 to generate TWO separate DMG installers
        run: npx electron-builder --mac --x64 --arm64 --publish never

      - name: Upload the final Mac apps
        uses: actions/upload-artifact@v4
        with:
          name: Mac-Installers
          path: dist/*.dmg
